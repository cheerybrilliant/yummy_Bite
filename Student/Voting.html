<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voting - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Student.css">
    <script>
        window.PAGE = 'voting';
        window.SECTION = 'student';
        window.PATHS = { home: 'Home.html', menu: 'Menu.html', about: 'About page.html', login: 'Login.html', register: 'Register.html', cart: 'Cart.html', payment: 'Payment.htm', confirmation: 'order.html', receipt: 'Receipt.htm', tracking: 'Order tracking.html', review: 'Review.html', voting: 'Voting.html', staffLogin: '../Staff/Staff-login.html', dashboard: '../Staff/Staff-dashboard.html', paymentVerification: '../Staff/Payment verification.html', adminMenu: '../Admin/Menu-management.html', dailyMenu: '../Admin/Daily-menu.html', votingResults: '../Admin/Voting-results.html', analytics: '../Admin/Analytics.html', manageCooks: '../Admin/Manage-cooks.html' };
    </script>
</head>
<body>
    <header class="topbar">
<div class="wrap">
<a class="brand" href="Home.html">
<span class="logo-slot"><img class="school-logo" src="../assets/school-logo.png" alt="The ICT University logo" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="dot" hidden>YB</span></span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
<nav class="role-switch" id="roleSwitch">
</nav>
</div>
</header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view" id="votingPage">
<nav class="subnav">
<a class="chip" href="Menu.html">Menu</a>
<a class="chip on" href="Voting.html">Vote</a>
</nav>
<span class="eyebrow">Weekly vote</span>
<h1 class="title">Vote and suggest meals</h1>
<p class="sub">Students vote weekly. Cooks approve suggestions they can actually prepare.</p>
<form class="card" id="suggestionForm">
<h2>Suggest a meal</h2>
<label>Meal name<input name="name" required>
</label>
<label>Short note<input name="description">
</label>
<button class="btn" type="submit">Send suggestion</button>
</form>
<form class="card" id="voteForm">
<h2>Vote for up to three dishes</h2>
<div id="voteDishList" class="check-list">
</div>
<button class="btn green" type="submit">Submit weekly vote</button>
</form>
</section>
    </main>
    <script src="../js/Store.js">
</script>
<script src="../js/auth.js">
</script>
<script src="../js/Menu.js">
</script>
<script src="../js/Cart.js">
</script>
<script src="../js/Payment.js">
</script>
<script src="../js/Order.js">
</script>
<script src="../js/Staff.js">
</script>
<script src="../js/admin.js">
</script>

</html>
