<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Tracking - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Student.css">
    <script>
        window.PAGE = 'tracking';
        window.SECTION = 'student';
        window.PATHS = { home: 'Home.html', menu: 'Menu.html', about: 'About page.html', login: 'Login.html', register: 'Register.html', cart: 'Cart.html', payment: 'Payment.htm', confirmation: 'order.html', receipt: 'Receipt.htm', tracking: 'Order tracking.html', review: 'Review.html', voting: 'Voting.html', staffLogin: '../Staff/Staff-login.html', dashboard: '../Staff/Staff-dashboard.html', paymentVerification: '../Staff/Payment verification.html', adminMenu: '../Admin/Menu-management.html', dailyMenu: '../Admin/Daily-menu.html', votingResults: '../Admin/Voting-results.html', analytics: '../Admin/Analytics.html', manageCooks: '../Admin/Manage-cooks.html' };
    </script>
</head>
<body>
    <header class="topbar">
<div class="wrap">
<a class="brand" href="Home.html">
<span class="dot">YB</span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
<nav class="role-switch" id="roleSwitch">
</nav>
</div>
</header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view" id="trackingPage">
<nav class="subnav">
<a class="chip" href="Menu.html">Menu</a>
<a class="chip on" href="Order tracking.html">My Orders</a>
<a class="chip" href="Review.html">Review</a>
</nav>
<span class="eyebrow">Order tracking</span>
<h1 class="title">My orders</h1>
<table class="app-table">
<thead>
<tr>
<th>Order ID</th>
<th>Date</th>
<th>Amount</th>
<th>Status</th>
<th>Payment</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ordersTableBody">
</tbody>
</table>
<p id="ordersEmpty" class="empty" hidden>No orders yet.</p>
<article class="card" id="orderDetails" hidden>
<h2>Order <span id="detailOrderId">
</span>
</h2>
<p>Status: <strong id="detailStatus">
</strong>
</p>
<p>Date: <span id="detailDate">
</span>
</p>
<p>Amount: <strong id="detailAmount">
</strong>
</p>
<h3>Items</h3>
<ul id="detailItems">
</ul>
<div class="cta">
<button id="uploadProofButton" class="btn" type="button" hidden>Upload payment proof</button>
<button id="receiveOrderButton" class="btn green" type="button" hidden>I have received it</button>
<button id="reviewOrderButton" class="btn ghost" type="button" hidden>Rate this order</button>
</div>
<h3>Transaction log</h3>
<table class="app-table">
<thead>
<tr>
<th>Action</th>
<th>Note</th>
<th>Date</th>
</tr>
</thead>
<tbody id="transactionLogBody">
</tbody>
</table>
</article>
</section>
    </main>
    <script src="../js/Store.js">
</script>
<script src="../js/auth.js">
</script>
<script src="../js/Menu.js">
</script>
<script src="../js/Cart.js">
</script>
<script src="../js/Payment.js">
</script>
<script src="../js/Order.js">
</script>
<script src="../js/Staff.js">
</script>
<script src="../js/admin.js">
</script>
</body>
</html>
