<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Student.css">
    <script>
        window.PAGE = 'menu';
        window.SECTION = 'student';
        window.PATHS = {
            home: 'Home.html', menu: 'Menu.html', about: 'About page.html', login: 'Login.html', register: 'Register.html',
            cart: 'Cart.html', payment: 'Payment.htm', confirmation: 'order.html', receipt: 'Receipt.htm', tracking: 'Order tracking.html',
            review: 'Review.html', voting: 'Voting.html', staffLogin: '../Staff/Staff-login.html', dashboard: '../Staff/Staff-dashboard.html',
            paymentVerification: '../Staff/Payment verification.html', adminMenu: '../Admin/Menu-management.html', dailyMenu: '../Admin/Daily-menu.html',
            votingResults: '../Admin/Voting-results.html', analytics: '../Admin/Analytics.html', manageCooks: '../Admin/Manage-cooks.html'
        };
    </script>
</head>
<body>
    <header class="topbar">
        <div class="wrap">
            <a class="brand" href="Home.html">
<span class="logo-slot"><img class="school-logo" src="../assets/school-logo.png" alt="The ICT University logo" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="dot" hidden>YB</span></span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
            <nav class="role-switch" id="roleSwitch">
</nav>
        </div>
    </header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view" id="menuPage">
            <nav class="subnav">
<a class="chip" href="Home.html">Home</a>
<a class="chip on" href="Menu.html">Menu</a>
<a class="chip" href="Order tracking.html">My Orders</a>
<a class="chip" href="Voting.html">Vote</a>
</nav>
            <span class="eyebrow">Daily Menu</span>
<h1 class="title">Today on the menu</h1>
            <p class="sub">Meals below are loaded from the database daily menu. Students must log in before ordering.</p>
            <div class="toolbar">
<input id="dishSearch" class="input" placeholder="Search dishes">
<select id="dishCategory">
<option>All</option>
<option>Mains</option>
<option>Soups</option>
<option>Snacks</option>
<option>Drinks</option>
</select>
<a class="btn sm" href="Cart.html">Cart (<span data-cart-count>0</span>)</a>
</div>
            <div id="menuGrid" class="menu-grid">
</div>
<p id="menuEmpty" class="empty" hidden>No dishes are available today.</p>
            <template id="dishCardTemplate">
<article class="card dish">
<img class="dish-photo" data-dish-image src="" alt="">
<div class="body">
<h3 data-dish-name>
</h3>
<p data-dish-description>
</p>
<span class="pill in" data-dish-category>
</span>
<span class="pill low" data-dish-quantity>
</span>
<div class="row">
<strong class="money" data-dish-price>
</strong>
<button class="btn sm" type="button" data-add-cart>Add to cart</button>
</div>
</div>
</article>
</template>
        </section>
    </main>
    <script src="../js/Store.js">
</script>
    <script src="../js/auth.js">
</script>
    <script src="../js/Menu.js">
</script>
    <script src="../js/Cart.js">
</script>
    <script src="../js/Payment.js">
</script>
    <script src="../js/Order.js">
</script>
    <script src="../js/Staff.js">
</script>
    <script src="../js/admin.js">
</script>
</body>
</html>
