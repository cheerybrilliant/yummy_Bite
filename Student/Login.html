<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Student.css">
    <script>
        window.PAGE = 'login';
        window.SECTION = 'student';
        window.PATHS = {
            home: 'Home.html', menu: 'Menu.html', about: 'About page.html', login: 'Login.html', register: 'Register.html',
            cart: 'Cart.html', payment: 'Payment.htm', confirmation: 'order.html', receipt: 'Receipt.htm', tracking: 'Order tracking.html',
            review: 'Review.html', voting: 'Voting.html', staffLogin: '../Staff/Staff-login.html', dashboard: '../Staff/Staff-dashboard.html',
            paymentVerification: '../Staff/Payment verification.html', adminMenu: '../Admin/Menu-management.html', dailyMenu: '../Admin/Daily-menu.html',
            votingResults: '../Admin/Voting-results.html', analytics: '../Admin/Analytics.html', manageCooks: '../Admin/Manage-cooks.html'
        };
    </script>
</head>
<body>
    <header class="topbar">
        <div class="wrap">
            <a class="brand" href="Home.html">
<span class="logo-slot"><img class="school-logo" src="../assets/school-logo.png" alt="The ICT University logo" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="dot" hidden>YB</span></span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
            <nav class="role-switch" id="roleSwitch">
</nav>
        </div>
    </header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view">
<nav class="subnav">
<a class="chip" href="Home.html">Home</a>
<a class="chip on" href="Login.html">Login</a>
<a class="chip" href="Register.html">Signup</a>
</nav>
<span class="eyebrow">Sign in</span>
<h1 class="title">Login to your account</h1>
<p class="sub">Choose your role first. The correct login form will appear after you select Student, Cook, or Admin.</p>

<div class="role-choice-grid" id="roleChoiceGrid">
<button class="role-card" type="button" data-role-choice="student">
<h3>Student</h3>
<p>Order meals, upload payment proof, track pickup, vote weekly, and review food.</p>
</button>
<button class="role-card" type="button" data-role-choice="cook">
<h3>Cook</h3>
<p>Verify payment, prepare orders, mark food ready, and approve meal suggestions.</p>
</button>
<button class="role-card" type="button" data-role-choice="admin">
<h3>Admin</h3>
<p>Manage the menu, daily stock, cooks, voting results, and analytics.</p>
</button>
</div>

<div class="role-panel" id="studentPanel" hidden>
<button class="chip" type="button" data-back-roles>Back to roles</button>
<form class="card auth-card" id="studentLoginForm">
<h2>Student</h2>
<label>Email<input name="email" type="email" required>
</label>
<label>Password<input name="password" type="password" required>
</label>
<button class="btn" type="submit">Student login</button>
</form>
</div>

<div class="role-panel" id="cookPanel" hidden>
<button class="chip" type="button" data-back-roles>Back to roles</button>
<form class="card auth-card" id="staffLoginForm">
<h2>Cook</h2>
<label>Staff ID or email<input name="staffId" required>
</label>
<input name="email" type="hidden">
<label>Password<input name="password" type="password" required>
</label>
<button class="btn green" type="submit">Cook login</button>
</form>
</div>

<div class="role-panel" id="adminPanel" hidden>
<button class="chip" type="button" data-back-roles>Back to roles</button>
<form class="card auth-card" id="adminLoginForm">
<h2>Admin</h2>
<label>Email<input name="email" type="email" required>
</label>
<label>Password<input name="password" type="password" required>
</label>
<button class="btn dark" type="submit">Admin login</button>
</form>
</div>
</section>
    </main>
    <script src="../js/Store.js">
</script>
    <script src="../js/auth.js">
</script>
    <script src="../js/Menu.js">
</script>
    <script src="../js/Cart.js">
</script>
    <script src="../js/Payment.js">
</script>
    <script src="../js/Order.js">
</script>
    <script src="../js/Staff.js">
</script>
    <script src="../js/admin.js">
</script>
</body>
</html>
