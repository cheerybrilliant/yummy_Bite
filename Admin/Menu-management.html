<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Management - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Admin.css">
    <script>
        window.PAGE = 'adminMenu';
        window.SECTION = 'admin';
        window.PATHS = { home: '../Student/Home.html', menu: '../Student/Menu.html', about: '../Student/About page.html', login: '../Student/Login.html', register: '../Student/Register.html', cart: '../Student/Cart.html', payment: '../Student/Payment.htm', confirmation: '../Student/order.html', receipt: '../Student/Receipt.htm', tracking: '../Student/Order tracking.html', review: '../Student/Review.html', voting: '../Student/Voting.html', staffLogin: '../Staff/Staff-login.html', dashboard: '../Staff/Staff-dashboard.html', paymentVerification: '../Staff/Payment verification.html', adminMenu: 'Menu-management.html', dailyMenu: 'Daily-menu.html', votingResults: 'Voting-results.html', analytics: 'Analytics.html', manageCooks: 'Manage-cooks.html' };
    </script>
</head>
<body>
    <header class="topbar">
<div class="wrap">
<a class="brand" href="../Student/Home.html">
<span class="logo-slot"><img class="school-logo" src="../assets/school-logo.png" alt="The ICT University logo" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="dot" hidden>YB</span></span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
<nav class="role-switch" id="roleSwitch">
</nav>
</div>
</header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view" id="menuManagementPage">
<nav class="subnav">
<a class="chip" href="Menu-management.html">Menu</a>
<a class="chip" href="Daily-menu.html">Daily menu</a>
<a class="chip" href="Voting-results.html">Voting</a>
<a class="chip" href="Analytics.html">Analytics</a>
<a class="chip" href="Manage-cooks.html">Cooks</a>
</nav>
<span class="eyebrow">Admin</span>
<h1 class="title">Menu management</h1>
<div class="grid-2">
<form class="card" id="dishForm">
<h2>Add or edit dish</h2>
<input id="dishId" name="dishId" type="hidden">
<label>Name<input name="name" required>
</label>
<label>Description<textarea name="description" rows="3">
</textarea>
</label>
<label>Category<select name="category">
<option>Mains</option>
<option>Soups</option>
<option>Snacks</option>
<option>Drinks</option>
</select>
</label>
<label>Price FCFA<input name="price" type="number" min="0" required>
</label>
<label>Image URL or uploaded data<input id="dishImage" name="image">
</label>
<label>Upload image<input id="dishImageFile" name="imageFile" type="file" accept="image/*">
</label>
<div class="cta">
<button class="btn" type="submit">Save dish</button>
<button class="btn ghost" id="clearDishForm" type="button">Clear</button>
</div>
</form>
<article class="card">
<h2>Dishes in database</h2>
<table class="app-table">
<thead>
<tr>
<th>Dish</th>
<th>Category</th>
<th>Price</th>
<th>Image</th>
<th>Action</th>
</tr>
</thead>
<tbody id="dishTableBody">
</tbody>
</table>
</article>
</div>
</section>
    </main>
    <script src="../js/Store.js">
</script>
<script src="../js/auth.js">
</script>
<script src="../js/Menu.js">
</script>
<script src="../js/Cart.js">
</script>
<script src="../js/Payment.js">
</script>
<script src="../js/Order.js">
</script>
<script src="../js/Staff.js">
</script>
<script src="../js/admin.js">
</script>
</body>
</html>
