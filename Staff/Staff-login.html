<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Staff Login - ICTU Canteen</title>
    <link rel="stylesheet" href="../css folder/Global.css">
    <link rel="stylesheet" href="../css folder/Staff.css">
    <script>
        window.PAGE = 'staffLogin';
        window.SECTION = 'staff';
        window.PATHS = { home: '../Student/Home.html', menu: '../Student/Menu.html', about: '../Student/About page.html', login: '../Student/Login.html', register: '../Student/Register.html', cart: '../Student/Cart.html', payment: '../Student/Payment.htm', confirmation: '../Student/order.html', receipt: '../Student/Receipt.htm', tracking: '../Student/Order tracking.html', review: '../Student/Review.html', voting: '../Student/Voting.html', staffLogin: 'Staff-login.html', dashboard: 'Staff-dashboard.html', paymentVerification: 'Payment verification.html', adminMenu: '../Admin/Menu-management.html', dailyMenu: '../Admin/Daily-menu.html', votingResults: '../Admin/Voting-results.html', analytics: '../Admin/Analytics.html', manageCooks: '../Admin/Manage-cooks.html' };
    </script>
</head>
<body>
    <header class="topbar">
<div class="wrap">
<a class="brand" href="../Student/Home.html">
<span class="logo-slot"><img class="school-logo" src="../assets/school-logo.png" alt="The ICT University logo" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="dot" hidden>YB</span></span>
<span>ICTU Canteen<small>The ICT University</small>
</span>
</a>
<nav class="role-switch" id="roleSwitch">
</nav>
</div>
</header>
    <div id="notice" class="notice" hidden>
</div>
    <main class="wrap">
        <section class="view">
<h1 class="title">Kitchen sign-in</h1>
<form class="card auth-card" id="staffLoginForm">
<label>Staff ID or email<input name="staffId" required>
</label>
<input name="email" type="hidden">
<label>Password<input name="password" type="password" required>
</label>
<button class="btn green" type="submit">Enter kitchen</button>
</form>
</section>
    </main>
    <script src="../js/Store.js">
</script>
<script src="../js/auth.js">
</script>
<script src="../js/Menu.js">
</script>
<script src="../js/Cart.js">
</script>
<script src="../js/Payment.js">
</script>
<script src="../js/Order.js">
</script>
<script src="../js/Staff.js">
</script>
<script src="../js/admin.js">
</script>
</body>
</html>
